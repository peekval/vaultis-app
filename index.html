function findAsset(id, type) {
  const list = CATALOG[type] || [];
  return list.find(a => a.id === id) || null;
}

function allAssets() {
  return Object.entries(CATALOG).flatMap(([type, list]) => list.map(a => ({ ...a, type })));
}

function load() {
  try {
    const t = localStorage.getItem(STORAGE.TXNS);
    if (t) transactions = JSON.parse(t);
    const m = localStorage.getItem(STORAGE.MANUAL);
    if (m) manualPrices = JSON.parse(m);
    const p = localStorage.getItem(STORAGE.PCACHE);
    if (p) priceCache = JSON.parse(p);
    const h = localStorage.getItem(STORAGE.HCACHE);
    if (h) histCache = JSON.parse(h);
    const s = localStorage.getItem(STORAGE.SETTINGS);
    if (s) settings = { ...settings, ...JSON.parse(s) };
    const apiBase = localStorage.getItem('vaultis_api_base');
    if (apiBase) API_BASE = apiBase;
  } catch (e) {
    console.warn('load error', e);
  }
}

function saveTxns() { localStorage.setItem(STORAGE.TXNS, JSON.stringify(transactions)); }
function saveManual() { localStorage.setItem(STORAGE.MANUAL, JSON.stringify(manualPrices)); }
function savePCache() { localStorage.setItem(STORAGE.PCACHE, JSON.stringify(priceCache)); }
function saveHCache() { localStorage.setItem(STORAGE.HCACHE, JSON.stringify(histCache)); }
function saveSettings() { localStorage.setItem(STORAGE.SETTINGS, JSON.stringify(settings)); }

function saveApiBase(val) {
  const trimmed = val.trim();
  API_BASE = trimmed || API_BASE_DEFAULT;
  localStorage.setItem('vaultis_api_base', API_BASE);
  const el = document.getElementById('set-api-status');
  if (el) el.textContent = `Gespeichert: ${API_BASE}`;
}

function setManualPrice(assetId, price) {
  manualPrices[assetId] = { price: parseFloat(price), currency: settings.currency, setAt: Date.now() };
  saveManual();
}

function clearManualPrice(assetId) {
  delete manualPrices[assetId];
  saveManual();
}

function getEffectivePrice(assetId) {
  if (manualPrices[assetId]) {
    return { price: manualPrices[assetId].price, source: 'manual', change24h: 0 };
  }
  if (priceCache[assetId] && typeof priceCache[assetId].price === 'number' && priceCache[assetId].price > 0) {
    return {
      price: priceCache[assetId].price,
      source: priceCache[assetId].source || 'cached',
      change24h: priceCache[assetId].change24h || 0,
    };
  }
  return null;
}

async function apiGet(path, timeoutMs = 10000) {
  if (!API_BASE) throw new Error('API_BASE nicht konfiguriert');

  const url = API_BASE.replace(/\/$/, '') + path;

  const timeoutPromise = new Promise((_, reject) => {
    setTimeout(() => reject(new Error('Request Timeout')), timeoutMs);
  });

  const fetchPromise = fetch(url).then(async (r) => {
    if (!r.ok) {
      const body = await r.json().catch(() => ({}));
      throw new Error(body.error || `HTTP ${r.status}`);
    }
    return r.json();
  });

  return Promise.race([fetchPromise, timeoutPromise]);
}

async function fetchQuote(id, type) {
  try {
    const cur = settings.currency;
    const data = await apiGet(`/api/quote?symbol=${encodeURIComponent(id)}&type=${encodeURIComponent(type)}&currency=${cur}`);

    if (!data || typeof data.price !== 'number' || data.price <= 0) {
      return null;
    }

    priceCache[id] = {
      price: data.price,
      change24h: data.change24h || data.percent || 0,
      currency: data.currency || cur,
      source: data.source || 'api',
      fetchedAt: Date.now()
    };

    savePCache();
    return data;
  } catch (e) {
    console.warn(`[quote] ${id}:`, e.message);
    return null;
  }
}

async function fetchHistory(id, type, range) {
  try {
    const cur = settings.currency;
    const data = await apiGet(`/api/history?symbol=${encodeURIComponent(id)}&type=${encodeURIComponent(type)}&range=${range}&currency=${cur}`);
    return data;
  } catch (e) {
    console.warn(`[history] ${id} ${range}:`, e.message);
    return null;
  }
}

async function fetchHistoryByDate(id, type, date) {
  const cacheKey = `${id}_${type}_${date}_${settings.currency}`;
  if (histCache[cacheKey] != null) return histCache[cacheKey];

  try {
    const target = new Date(date);
    if (isNaN(target.getTime())) return null;

    const today = new Date();
    const diffDays = Math.floor((today - target) / 86400000);

    if (diffDays <= 0) {
      const q = await fetchQuote(id, type);
      if (q && typeof q.price === 'number' && q.price > 0) {
        histCache[cacheKey] = q.price;
        saveHCache();
        return q.price;
      }
      return null;
    }

    let range = '1m';
    if (diffDays > 30 && diffDays <= 180) range = '6m';
    else if (diffDays > 180) range = '1y';

    const data = await fetchHistory(id, type, range);
    if (!data || !Array.isArray(data.points) || data.points.length === 0) return null;

    const targetStr = date.slice(0, 10);
    let best = null;

    for (const pt of data.points) {
      const ptDate = String(pt.date).slice(0, 10);
      if (ptDate <= targetStr && typeof pt.price === 'number' && pt.price > 0) {
        best = pt.price;
      }
    }

    if (best == null) {
      const first = data.points.find(pt => typeof pt.price === 'number' && pt.price > 0);
      if (first) best = first.price;
    }

    if (best != null) {
      histCache[cacheKey] = best;
      saveHCache();
      return best;
    }

    return null;
  } catch (e) {
    console.warn(`[hist-by-date] ${id} ${date}:`, e.message);
    return null;
  }
}

function getPositions() {
  const grouped = {};

  for (const t of transactions) {
    const key = `${t.type}:${t.assetId}`;
    if (!grouped[key]) grouped[key] = { assetId: t.assetId, type: t.type, txns: [] };
    grouped[key].txns.push(t);
  }

  return Object.values(grouped).map(g => {
    const asset = findAsset(g.assetId, g.type);
    if (!asset) return null;

    let units = 0;
    let investedTotal = 0;

    for (const t of g.txns) {
      const u = t.mode === 'amount' ? (t.calculatedUnits || 0) : (t.units || 0);
      const invested = t.mode === 'amount'
        ? (t.investedAmount || 0) + (t.fees || 0)
        : (t.units || 0) * (t.unitPrice || 0) + (t.fees || 0);
      units += u;
      investedTotal += invested;
    }

    const avgCost = units > 0 ? investedTotal / units : 0;
    const eff = getEffectivePrice(g.assetId);
    const currentPrice = eff ? eff.price : avgCost;
    const priceSource = eff ? eff.source : 'missing';
    const change24h = eff ? (eff.change24h || 0) : 0;
    const currentValue = units * currentPrice;
    const pnlAbsolute = currentValue - investedTotal;
    const pnlPercent = investedTotal > 0 ? ((currentValue / investedTotal) - 1) * 100 : 0;
    const priorValue = change24h !== 0 ? currentValue / (1 + change24h / 100) : currentValue;
    const dayChangeAbsolute = currentValue - priorValue;
    const dayChangePercent = change24h;

    return {
      asset,
      type: g.type,
      txns: g.txns,
      units,
      investedTotal,
      avgCost,
      currentPrice,
      priceSource,
      change24h,
      currentValue,
      pnlAbsolute,
      pnlPercent,
      dayChangeAbsolute,
      dayChangePercent
    };
  }).filter(Boolean);
}

function getTotals(positions) {
  const totalValue = positions.reduce((s, p) => s + p.currentValue, 0);
  const totalInvested = positions.reduce((s, p) => s + p.investedTotal, 0);
  const totalPnL = totalValue - totalInvested;
  const totalPnLPct = totalInvested > 0 ? ((totalValue / totalInvested) - 1) * 100 : 0;
  const totalDay = positions.reduce((s, p) => s + p.dayChangeAbsolute, 0);
  const totalDayPct = totalValue > totalDay ? (totalDay / (totalValue - totalDay)) * 100 : 0;
  const live = positions.filter(p => p.priceSource && p.priceSource !== 'missing' && p.priceSource !== 'manual').length;
  const manual = positions.filter(p => p.priceSource === 'manual').length;
  const missing = positions.filter(p => p.priceSource === 'missing').length;
  return { totalValue, totalInvested, totalPnL, totalPnLPct, totalDay, totalDayPct, live, manual, missing, total: positions.length };
}

async function refreshPrices() {
  if (!API_BASE) {
    showToast('API-URL in Einstellungen konfigurieren', 'warn');
    return;
  }

  const positions = getPositions();
  if (positions.length === 0) {
    showToast('Keine Positionen', '');
    return;
  }

  showToast('Kurse werden aktualisiert…', '');

  for (const p of positions) {
    if (manualPrices[p.asset.id]) continue;
    await fetchQuote(p.asset.id, p.type);
  }

  renderHome();
  renderPortfolio();
  renderMarkets();
  if (detailAsset) renderDetail(detailAsset.id, detailAsset.type);
  showToast('Kurse aktualisiert', 'ok');
}

function showScreen(id) {
  if (id !== 'detail') prevScreen = currentScreen;
  currentScreen = id;

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + id);
  if (el) el.classList.add('active');

  document.querySelectorAll('.nav-btn[data-s]').forEach(b => {
    b.classList.toggle('active', b.dataset.s === id);
  });

  if (id === 'home') renderHome();
  if (id === 'portfolio') renderPortfolio();
  if (id === 'markets') renderMarkets();
  if (id === 'add' && !editingId) resetAddForm();
  if (id === 'settings') initSettings();

  window.scrollTo(0, 0);
}

function goBack() {
  showScreen(prevScreen);
}

function fmtMoney(n, currency = settings.currency, decimals = 2) {
  return new Intl.NumberFormat('de-CH', {
    style: 'currency',
    currency,
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  }).format(n);
}

function fmtPct(n) {
  const sign = n >= 0 ? '+' : '';
  return `${sign}${n.toFixed(2)}%`;
}

function fmtSign(n, currency) {
  return (n >= 0 ? '+' : '−') + fmtMoney(Math.abs(n), currency);
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function getZurichHour() {
  return parseInt(new Intl.DateTimeFormat('en-US', {
    hour: 'numeric',
    hour12: false,
    timeZone: 'Europe/Zurich'
  }).format(new Date()), 10);
}

function getGreeting() {
  const h = getZurichHour();
  if (h < 12) return 'Guten Morgen';
  if (h < 18) return 'Guten Tag';
  return 'Guten Abend';
}

function mkBanner(cls, icon, title, desc, btnLabel, btnAction) {
  return `<div class="banner ${cls}">
    <div class="banner-icon">${icon}</div>
    <div class="banner-text"><div class="banner-title">${title}</div><div>${desc}</div></div>
    ${btnLabel ? `<button class="banner-btn" onclick="${btnAction}">${btnLabel}</button>` : ''}
  </div>`;
}

function posRow(p) {
  const chgCls = p.pnlPercent > 0.01 ? 'up' : (p.pnlPercent < -0.01 ? 'down' : 'zero');
  const srcTag = p.priceSource === 'missing'
    ? `<span class="tag missing">?</span>`
    : p.priceSource === 'manual'
      ? `<span class="tag manual">M</span>`
      : '';

  return `<div class="pos-row" onclick="openDetail('${p.asset.id}','${p.type}')">
    <div class="pos-icon" style="background:${p.asset.bg};color:${p.asset.color}">${p.asset.icon}</div>
    <div class="pos-info">
      <div class="pos-row1">
        <span class="pos-ticker">${p.asset.sym}</span>
        <span class="tag ${p.type}">${p.type.toUpperCase()}</span>
        ${srcTag}
      </div>
      <div class="pos-name">${p.asset.name}</div>
    </div>
    <div class="pos-right">
      <div class="pos-val">${fmtMoney(p.currentValue)}</div>
      <div class="pos-chg ${chgCls}">${fmtPct(p.pnlPercent)}</div>
    </div>
  </div>`;
}

function renderHome() {
  const greetingEl = document.getElementById('greeting');
  const subEl = document.getElementById('greeting-sub');
  if (greetingEl) greetingEl.textContent = getGreeting();
  if (subEl) subEl.textContent = 'Dein Portfolio · ' + new Date().toLocaleDateString('de-CH', { day: '2-digit', month: 'long', year: 'numeric' });

  const positions = getPositions();
  const t = getTotals(positions);
  const cur = settings.currency;

  document.getElementById('hero-val').textContent = fmtMoney(t.totalValue, cur);
  document.getElementById('hero-inv').textContent = fmtMoney(t.totalInvested, cur);

  const pnlEl = document.getElementById('hero-pnl');
  pnlEl.textContent = fmtSign(t.totalPnL, cur);
  pnlEl.className = 'hero-stat-val ' + (t.totalPnL >= 0 ? 'pos' : 'neg');

  const pnlPctEl = document.getElementById('hero-pnl-pct');
  pnlPctEl.textContent = fmtPct(t.totalPnLPct);
  pnlPctEl.style.color = t.totalPnL >= 0 ? 'var(--positive)' : 'var(--negative)';

  const dayEl = document.getElementById('hero-day');
  dayEl.textContent = fmtSign(t.totalDay, cur);
  dayEl.className = 'hero-stat-val ' + (t.totalDay >= 0 ? 'pos' : (t.totalDay < 0 ? 'neg' : 'muted'));

  const dayPctEl = document.getElementById('hero-day-pct');
  if (isFinite(t.totalDayPct) && t.totalDayPct !== 0) {
    dayPctEl.textContent = fmtPct(t.totalDayPct);
    dayPctEl.style.color = t.totalDay >= 0 ? 'var(--positive)' : 'var(--negative)';
  } else {
    dayPctEl.textContent = '—';
    dayPctEl.style.color = 'var(--text3)';
  }

  const retEl = document.getElementById('hero-ret');
  if (positions.length === 0) {
    retEl.className = 'hero-change zero';
    retEl.textContent = '— 0.00%';
  } else if (t.totalPnLPct >= 0) {
    retEl.className = 'hero-change up';
    retEl.textContent = '↑ ' + fmtPct(t.totalPnLPct);
  } else {
    retEl.className = 'hero-change down';
    retEl.textContent = '↓ ' + fmtPct(t.totalPnLPct);
  }

  const qEl = document.getElementById('hero-quality');
  if (positions.length === 0) {
    qEl.textContent = '—';
  } else {
    const parts = [];
    if (t.live > 0) parts.push(`${t.live} live`);
    if (t.manual > 0) parts.push(`${t.manual} manuell`);
    if (t.missing > 0) parts.push(`${t.missing} fehlt`);
    qEl.textContent = parts.join(' · ');
    qEl.style.color = t.missing > 0 ? 'var(--gold)' : 'var(--text3)';
  }

  const bannerEl = document.getElementById('home-banner');
  if (t.missing > 0) {
    bannerEl.innerHTML = mkBanner(
      'info',
      '⚠',
      `${t.missing} Position${t.missing > 1 ? 'en' : ''} ohne Kurs`,
      'Öffne die Detailseite um einen manuellen Kurs zu setzen.',
      'Aktualisieren',
      'refreshPrices()'
    );
  } else {
    bannerEl.innerHTML = '';
  }

  const homePos = document.getElementById('home-positions');
  if (positions.length === 0) {
    homePos.innerHTML = `<div class="empty"><div class="empty-icon">◈</div><div class="empty-title">Noch keine Positionen</div><div class="empty-desc">Tippe auf + um deine erste Position hinzuzufügen.</div></div>`;
  } else {
    homePos.innerHTML = `<div class="pos-list">${positions.slice(0, 5).map(posRow).join('')}</div>`;
  }

  if (positions.length > 0) {
    document.getElementById('alloc-card').style.display = 'block';
    renderAllocChart(positions);
  } else {
    document.getElementById('alloc-card').style.display = 'none';
  }
}

function renderAllocChart(positions) {
  const ctx = document.getElementById('alloc-chart');
  if (!ctx) return;

  if (allocChart) allocChart.destroy();

  const by = { crypto: 0, stock: 0, etf: 0, metal: 0 };
  positions.forEach(p => { by[p.type] = (by[p.type] || 0) + p.currentValue; });

  const total = Object.values(by).reduce((s, v) => s + v, 0);
  const cols = { crypto: '#7c6af5', stock: '#2ecc8f', etf: '#f0c060', metal: '#c0c4cc' };
  const labels = { crypto: 'Crypto', stock: 'Aktien', etf: 'ETFs', metal: 'Metalle' };
  const active = Object.keys(by).filter(k => by[k] > 0);

  document.getElementById('alloc-list').innerHTML = active.map(k => `
    <div class="alloc-row">
      <div class="alloc-dot" style="background:${cols[k]}"></div>
      <div class="alloc-name">${labels[k]}</div>
      <div class="alloc-pct">${total > 0 ? (by[k] / total * 100).toFixed(0) : 0}%</div>
    </div>
  `).join('');

  allocChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: active.map(k => by[k] || 0.001),
        backgroundColor: active.map(k => cols[k]),

      }]

}

function setPortfolioFilter(f, btn) {
  portfolioFilter = f;
  document.querySelectorAll('#ptf-filter .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPortfolio();
}

function renderPortfolio() {
  let positions = getPositions();
  if (portfolioFilter !== 'all') positions = positions.filter(p => p.type === portfolioFilter);

  const t = getTotals(positions);
  document.getElementById('ptf-sub').textContent = positions.length === 0 ? '—' : `${fmtMoney(t.totalValue)} · ${fmtPct(t.totalPnLPct)}`;

  const el = document.getElementById('ptf-list');
  if (positions.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">◈</div><div class="empty-title">Keine Positionen</div><div class="empty-desc">${portfolioFilter === 'all' ? 'Füge deine erste Position hinzu.' : 'Keine ' + portfolioFilter.toUpperCase() + '-Positionen.'}</div></div>`;

function openDetail(assetId, type) {
  detailAsset = { id: assetId, type };
  renderDetail(assetId, type);
  showScreen('detail');
}

async function renderDetail(assetId, type) {
  const positions = getPositions();
  const p = positions.find(x => x.asset.id === assetId && x.type === type);
  const a = p ? p.asset : findAsset(assetId, type);
  if (!a) return;

  const eff = getEffectivePrice(assetId);
  const priceStr = eff ? fmtMoney(eff.price, settings.currency, eff.price < 1 ? 6 : eff.price < 10 ? 4 : 2) : '—';
  const chg = eff ? eff.change24h : 0;
  const chgCls = chg > 0.01 ? 'up' : chg < -0.01 ? 'down' : 'zero';

  let priceBanner = '';
  if (!eff) {
    priceBanner = mkBanner('warn', '⚠', 'Kein Kurs verfügbar', 'Werte basieren auf dem Ø-Kaufpreis. Setze einen manuellen Kurs.', 'Kurs setzen', `openManualModal('${assetId}')`);
  } else if (eff.source === 'manual') {
    const mp = manualPrices[assetId];
    const when = mp ? new Date(mp.setAt).toLocaleDateString('de-CH') : '';
    priceBanner = mkBanner('info', '◈', `Manueller Kurs (gesetzt ${when})`, 'Wird für alle Berechnungen verwendet.', 'Bearbeiten', `openManualModal('${assetId}')`);
  }

  let metaHtml = '';
  if (type === 'stock' && a.exch) {
    metaHtml = `<div class="kv"><div class="kv-label">Exchange</div><div class="kv-val">${a.exch}</div><div class="kv-label">Sektor</div><div class="kv-val">${a.sect || '—'}</div><div class="kv-label">Land</div><div class="kv-val">${a.country || '—'}</div></div>`;
  } else if (type === 'etf' && a.provider) {
    metaHtml = `<div class="kv"><div class="kv-label">Anbieter</div><div class="kv-val">${a.provider}</div><div class="kv-label">ISIN</div><div class="kv-val">${a.isin || '—'}</div><div class="kv-label">TER</div><div class="kv-val">${a.ter || '—'}</div><div class="kv-label">Ausschüttung</div><div class="kv-val">${a.dist || '—'}</div></div>`;
  } else if (type === 'crypto' && a.cat) {
    metaHtml = `<div class="kv"><div class="kv-label">Kategorie</div><div class="kv-val">${a.cat}</div></div>`;
  } else if (type === 'metal' && a.unit) {
    metaHtml = `<div class="kv"><div class="kv-label">Einheit</div><div class="kv-val">${a.unit}</div></div>`;
  }

  let ptfHtml = '';
  if (p) {
    ptfHtml = `<div class="card" style="margin-bottom:12px;">
      <div class="section-title" style="margin-bottom:10px;">Deine Position</div>
      <div class="meta-grid">
        <div><div class="meta-item-label">Bestand</div><div class="meta-item-val">${p.units.toLocaleString('de-CH', { maximumFractionDigits: 8 })}</div></div>
        <div><div class="meta-item-label">Ø Kaufpreis</div><div class="meta-item-val">${fmtMoney(p.avgCost)}</div></div>
        <div><div class="meta-item-label">Investiert</div><div class="meta-item-val">${fmtMoney(p.investedTotal)}</div></div>
        <div><div class="meta-item-label">Aktueller Wert</div><div class="meta-item-val">${fmtMoney(p.currentValue)}</div></div>
        <div><div class="meta-item-label">G / V</div><div class="meta-item-val" style="color:${p.pnlAbsolute >= 0 ? 'var(--positive)' : 'var(--negative)'}">${fmtSign(p.pnlAbsolute)}</div></div>
        <div><div class="meta-item-label">Rendite</div><div class="meta-item-val" style="color:${p.pnlPercent >= 0 ? 'var(--positive)' : 'var(--negative)'}">${fmtPct(p.pnlPercent)}</div></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:12px;">
      <div class="section-title" style="margin-bottom:10px;">Transaktionen (${p.txns.length})</div>
      ${p.txns.map(t => txRow(t)).join('')}
      <div style="height:4px;"></div>
      <button class="btn btn-danger" style="margin-top:8px;" onclick="confirmDeletePosition('${assetId}','${type}')">Position vollständig löschen</button>
    </div>`;
  } else {
    ptfHtml = `<button class="btn btn-primary" onclick="preSelectAsset('${assetId}','${type}')">+ Zum Portfolio hinzufügen</button>`;
  }

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero">
      <div class="detail-icon-row">
        <div class="detail-icon" style="background:${a.bg};color:${a.color}">${a.icon}</div>
        <div>
          <div class="detail-name">${a.name}</div>
          <div class="detail-sub">${a.sym} · ${type.toUpperCase()}${a.exch ? ' · ' + a.exch : (a.provider ? ' · ' + a.provider : '')}</div>
        </div>
      </div>
      ${priceBanner}
      <div class="detail-price">${priceStr}</div>
      <div style="margin-top:6px;">
        <span class="hero-change ${chgCls}">${chg >= 0 ? '↑' : '↓'} ${Math.abs(chg).toFixed(2)}% (24h)</span>
        ${eff && eff.source !== 'manual' ? `<span style="font-size:10px;color:var(--text3);margin-left:8px;">${eff.source}</span>` : ''}
      </div>
    </div>

    ${a.desc ? `<div class="card" style="margin-bottom:12px;"><p style="font-size:13px;color:var(--text2);line-height:1.6;">${a.desc}</p>${metaHtml ? '<div style="margin-top:10px;">' + metaHtml + '</div>' : ''}</div>` : ''}

    <div id="detail-chart-area" style="margin-bottom:12px;"></div>

    ${ptfHtml}
  `;

  loadDetailChart(a, type, '1m');

function txRow(t) {
  const units = t.mode === 'amount' ? (t.calculatedUnits || 0) : (t.units || 0);
  const price = t.mode === 'amount' ? (t.unitPriceAtPurchase || 0) : (t.unitPrice || 0);
  const invested = t.mode === 'amount' ? (t.investedAmount || 0) : (units * price);

  return `<div class="tx-row">
    <div>
      <div class="tx-date">${t.date} · ${t.mode === 'amount' ? 'FIXBETRAG' : 'STÜCK'}</div>
      <div class="tx-detail">${units.toLocaleString('de-CH', { maximumFractionDigits: 8 })} × ${fmtMoney(price, t.currency, 2)}</div>
      ${t.notes ? `<div class="tx-date" style="margin-top:2px;">${t.notes}</div>` : ''}
    </div>
    <div style="text-align:right;">
      <div class="tx-amount">${fmtMoney(invested, t.currency)}</div>
      <div class="tx-actions">
        <button class="tx-btn edit" onclick="editTransaction('${t.id}')">Bearbeiten</button>
        <button class="tx-btn del" onclick="deleteTransaction('${t.id}')">Löschen</button>
      </div>
    </div>
  </div>`;
}

async function loadDetailChart(asset, type, range) {
  const area = document.getElementById('detail-chart-area');
  if (!area) return;

  const tabs = ['7d', '1m', '6m', '1y'].map(r => {
    const lbl = { '7d': '7T', '1m': '1M', '6m': '6M', '1y': '1J' }[r] || r.toUpperCase();
    return `<button class="chart-tab ${r === range ? 'active' : ''}" onclick="loadDetailChart(window.__detailAsset,window.__detailType,'${r}')">${lbl}</button>`;
  }).join('');

  area.innerHTML = `<div class="chart-card">
    <div class="chart-tabs">${tabs}</div>
    <div class="chart-wrap" id="detail-chart-wrap">
      <div id="detail-chart-loading" style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px;">
        <span class="spinner" style="margin-right:8px;"></span>Lade Daten…
      </div>
      <canvas id="detail-chart-canvas" style="display:none;"></canvas>
    </div>
    <div class="chart-summary" id="detail-chart-summary"></div>
  </div>`;

  window.__detailAsset = asset;
  window.__detailType = type;

  if (!API_BASE) {
    document.getElementById('detail-chart-loading').textContent = 'API nicht konfiguriert.';
    return;
  }

  const data = await fetchHistory(asset.id, type, range);
  const loadEl = document.getElementById('detail-chart-loading');
  const canvas = document.getElementById('detail-chart-canvas');
  const summEl = document.getElementById('detail-chart-summary');

  if (!data || !data.points || data.points.length < 2) {
    if (loadEl) {
      if (type === 'metal') loadEl.innerHTML = 'ℹ Metal-Charts aktuell nicht verfügbar.';
      else if (type === 'etf') loadEl.innerHTML = 'ℹ ETF-Charts aktuell nicht verfügbar.';
      else loadEl.innerHTML = `⚠ Keine historischen Daten für ${asset.sym} (${range})`;
    }
    return;
  }

  loadEl.style.display = 'none';
  canvas.style.display = 'block';

  if (detailChart) detailChart.destroy();

  const primary = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim() || '#7c6af5';
  const labels = data.points.map(pt => {
    const d = new Date(pt.date);
    if (range === '7d') {
      return d.toLocaleDateString('de-CH', { day: '2-digit', month: 'short' }) + ' ' + String(d.getHours()).padStart(2, '0') + 'h';
    }
    return d.toLocaleDateString('de-CH', { day: '2-digit', month: 'short', year: range === '1y' ? '2-digit' : undefined });
  });

  const values = data.points.map(pt => pt.price);
  const first = values[0];
  const last = values[values.length - 1];
  const chg = first > 0 ? ((last - first) / first * 100) : 0;

  detailChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: primary,
        backgroundColor: ctx => {
          const c = ctx.chart.ctx.createLinearGradient(0, 0, 0, 180);
          c.addColorStop(0, hexToRgba(primary, 0.2));
          c.addColorStop(1, hexToRgba(primary, 0));
          return c;
        },
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        pointHoverRadius: 4,
        borderWidth: 2,
        pointHoverBackgroundColor: primary,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e1e28',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#9090a8',
          bodyColor: '#f0f0f5',
          padding: 10,
          displayColors: false,
          callbacks: {
            label: c => fmtMoney(c.parsed.y, data.currency || settings.currency, c.parsed.y < 10 ? 4 : 2)
          }
        }
      },
      scales: {
        x: { display: true, ticks: { color: '#5a5a72', font: { size: 9 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 6 }, grid: { display: false } },
        y: { display: false }
      }
    }
  });

  summEl.innerHTML = `<span>Start: ${fmtMoney(first, data.currency || settings.currency, first < 10 ? 4 : 2)}</span>
    <span style="color:${chg >= 0 ? 'var(--positive)' : 'var(--negative)'};">${chg >= 0 ? '↑ +' : '↓ '}${Math.abs(chg).toFixed(2)}%</span>
    <span>Heute: ${fmtMoney(last, data.currency || settings.currency, last < 10 ? 4 : 2)}</span>`;
}

function openManualModal(assetId) {
  const existing = manualPrices[assetId];
  const cached = priceCache[assetId];
  const suggestion = existing ? existing.price.toFixed(2) : (cached ? cached.price.toFixed(2) : '');
  const asset = allAssets().find(a => a.id === assetId);

  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${asset ? asset.sym : assetId} — Manueller Kurs</div>
    <p style="text-align:center;font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5;">
      Dieser Kurs wird für alle Berechnungen verwendet.<br>Live-Preise werden überschrieben.
    </p>
    <div class="form-section">
      <label class="form-label">Kurs in ${settings.currency}</label>
      <input class="form-input" id="manual-price-input" type="number" step="any" inputmode="decimal" value="${suggestion}" placeholder="0.00">
    </div>
    <div style="display:flex;gap:10px;">
      ${existing ? `<button class="btn btn-danger btn-sm" style="flex:1;" onclick="clearManualAndClose('${assetId}')">Löschen</button>` : ''}

function saveManualAndClose(assetId) {
  const v = parseFloat(document.getElementById('manual-price-input').value);
  if (isNaN(v) || v <= 0) {
    showToast('Ungültiger Kurs', 'warn');
    return;
  }
  setManualPrice(assetId, v);
  closeModal();
  showToast('Kurs gespeichert', 'ok');
  if (detailAsset && detailAsset.id === assetId) renderDetail(assetId, detailAsset.type);
  renderHome();
}

function clearManualAndClose(assetId) {
  clearManualPrice(assetId);
  closeModal();
  showToast('Manueller Kurs entfernt', 'ok');
  if (detailAsset && detailAsset.id === assetId) renderDetail(assetId, detailAsset.type);
  renderHome();
}

async function saveTransaction() {
  if (!addAsset) {
    showToast('Bitte ein Asset auswählen', 'warn');
    return;
  }

  const date = document.getElementById('add-date').value;
  const currency = document.getElementById('add-currency').value;
  const fees = parseFloat(document.getElementById('add-fees').value) || 0;
  const notes = document.getElementById('add-notes').value.trim();

  let txnData;

  if (addMode === 'units') {
    const qty = parseFloat(document.getElementById('add-qty').value);
    const price = parseFloat(document.getElementById('add-price').value);

    if (isNaN(qty) || qty <= 0) {
      showToast('Stückzahl fehlt', 'warn');
      return;
    }
    if (isNaN(price) || price <= 0) {
      showToast('Preis fehlt', 'warn');
      return;
    }

    txnData = { mode: 'units', units: qty, unitPrice: price };
  } else {
    const amount = parseFloat(document.getElementById('add-amount').value);
    let histPrice = parseFloat(document.getElementById('add-histprice').value);

    if (isNaN(amount) || amount <= 0) {
      showToast('Betrag fehlt', 'warn');
      return;
    }

    const btn = document.getElementById('add-save-btn');

    if (isNaN(histPrice) || histPrice <= 0) {
      btn.innerHTML = '<span class="spinner"></span> Lade historischen Kurs…';
      histPrice = await fetchHistoryByDate(addAsset.id, addType, date);
      btn.textContent = editingId ? 'Änderungen speichern' : 'Position speichern';
    }

    if (!histPrice || histPrice <= 0) {
      document.getElementById('add-histprice-hint').innerHTML = '<span style="color:var(--negative);">Kurs nicht verfügbar — bitte manuell eingeben.</span>';
      showToast('Historischer Kurs nicht verfügbar — bitte manuell eingeben', 'warn');
      return;
    }

    const calculatedUnits = amount / histPrice;
    document.getElementById('add-histprice').value = histPrice.toFixed(8);
    document.getElementById('add-histprice-hint').textContent = `Auto-Kurs von ${date}: ${fmtMoney(histPrice, currency, 2)}`;

    txnData = { mode: 'amount', investedAmount: amount, unitPriceAtPurchase: histPrice, calculatedUnits };
  }

  const full = {
    ...txnData,
    assetId: addAsset.id,
    type: addType,
    date,
    currency,
    fees,
    notes
  };

  const wasEditing = !!editingId;

  if (editingId) {
    const idx = transactions.findIndex(t => t.id === editingId);
    if (idx !== -1) {
      transactions[idx] = { ...transactions[idx], ...full };
    } else {
      transactions.push({ id: 'tx_' + Date.now(), ...full });
    }
    editingId = null;
  } else {
    transactions.push({ id: 'tx_' + Date.now(), ...full });
  }

  saveTxns();

  if (API_BASE) {
    await fetchQuote(addAsset.id, addType);
  }

  showToast(wasEditing ? 'Änderungen gespeichert' : 'Position gespeichert', 'ok');
  renderHome();
  showScreen('home');
}

function editTransaction(txnId) {
  const t = transactions.find(x => x.id === txnId);
  if (!t) return;

  editingId = txnId;
  const asset = findAsset(t.assetId, t.type);
  if (!asset) {
    showToast('Asset nicht gefunden', 'warn');
    return;
  }

  addType = t.type;
  addAsset = asset;
  addMode = t.mode;

  showScreen('add');

  setTimeout(() => {
    ['crypto', 'stock', 'etf', 'metal'].forEach(tp => {
      document.getElementById('tbtn-' + tp).classList.toggle('active', tp === t.type);
    });

    document.getElementById('add-title').textContent = 'Transaktion bearbeiten';
    document.getElementById('edit-bar').style.display = 'flex';
    document.getElementById('add-save-btn').textContent = 'Änderungen speichern';

    document.getElementById('add-asset-selected').style.display = 'block';
    document.getElementById('add-asset-icon').style.background = asset.bg;
    document.getElementById('add-asset-icon').style.color = asset.color;
    document.getElementById('add-asset-icon').textContent = asset.icon;
    document.getElementById('add-asset-name').textContent = asset.name;
    document.getElementById('add-asset-sym').textContent = asset.sym + ' · ' + t.type.toUpperCase();

    setAddMode(t.mode);
    document.getElementById('add-date').value = t.date || '';
    document.getElementById('add-currency').value = t.currency || settings.currency;
    document.getElementById('add-fees').value = t.fees || '';
    document.getElementById('add-notes').value = t.notes || '';

    if (t.mode === 'units') {
      document.getElementById('add-qty').value = t.units || '';
      document.getElementById('add-price').value = t.unitPrice || '';
    } else {
      document.getElementById('add-amount').value = t.investedAmount || '';
      document.getElementById('add-histprice').value = t.unitPriceAtPurchase || '';
      onAmountInput();
    }
  }, 50);
}

function cancelEdit() {
  editingId = null;
  resetAddForm();
  showScreen('portfolio');
}

function preSelectAsset(assetId, type) {
  addType = type;
  addAsset = findAsset(assetId, type);
  editingId = null;
  showScreen('add');

  setTimeout(() => {
    ['crypto', 'stock', 'etf', 'metal'].forEach(tp => {
      document.getElementById('tbtn-' + tp).classList.toggle('active', tp === type);
    });

    if (addAsset) {
      document.getElementById('add-asset-selected').style.display = 'block';
      document.getElementById('add-asset-icon').style.background = addAsset.bg;
      document.getElementById('add-asset-icon').style.color = addAsset.color;
      document.getElementById('add-asset-icon').textContent = addAsset.icon;
      document.getElementById('add-asset-name').textContent = addAsset.name;
      document.getElementById('add-asset-sym').textContent = addAsset.sym + ' · ' + type.toUpperCase();
    }
  }, 50);
}

function setMarketFilter(f, btn) {
  marketFilter = f;
  document.querySelectorAll('.filter-btn[data-mf]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMarkets();
}

function renderMarkets() {
  const q = (document.getElementById('markets-input')?.value || '').trim().toLowerCase();
  let list = allAssets();

  if (marketFilter !== 'all') list = list.filter(a => a.type === marketFilter);
  if (q) {
    list = list.filter(a =>
      a.sym.toLowerCase().includes(q) ||
      a.name.toLowerCase().includes(q) ||
      (a.id && a.id.toLowerCase().includes(q)) ||
      (a.desc && a.desc.toLowerCase().includes(q)) ||
      (a.exch && a.exch.toLowerCase().includes(q)) ||
      (a.provider && a.provider.toLowerCase().includes(q))
    );
  }

  list.sort((a, b) => a.name.localeCompare(b.name, 'de'));
  document.getElementById('markets-count').textContent = `${list.length} Assets`;

  const el = document.getElementById('markets-list');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⌕</div><div class="empty-title">Keine Treffer</div></div>`;
    return;
  }

  const groups = {};
  list.forEach(a => {
    const l = a.name.charAt(0).toUpperCase();
    if (!groups[l]) groups[l] = [];
    groups[l].push(a);
  });

  el.innerHTML = Object.keys(groups).sort().map(letter => `
    <div class="letter-group">
      <div class="letter-label">${letter}</div>
      <div class="pos-list">
        ${groups[letter].map(a => marketRow(a)).join('')}
      </div>
    </div>
  `).join('');
}

function marketRow(a) {
  const eff = getEffectivePrice(a.id);
  const priceHtml = eff
    ? `<div class="pos-right">
        <div class="pos-val">${fmtMoney(eff.price, settings.currency, eff.price < 1 ? 6 : eff.price < 10 ? 4 : 2)}</div>
        ${eff.change24h ? `<div class="pos-chg ${eff.change24h >= 0 ? 'up' : 'down'}">${fmtPct(eff.change24h)}</div>` : ''}
      </div>`
    : '';

  const sub = a.exch || a.provider || a.cat || a.unit || '';

  return `<div class="pos-row" onclick="openDetail('${a.id}','${a.type}')">
    <div class="pos-icon" style="background:${a.bg};color:${a.color}">${a.icon}</div>
    <div class="pos-info">
      <div class="pos-row1">
        <span class="pos-ticker">${a.sym}</span>
        <span class="tag ${a.type}">${a.type.toUpperCase()}</span>
      </div>
      <div class="pos-name">${a.name}${sub ? ' · ' + sub : ''}</div>
    </div>
    ${priceHtml}
  </div>`;
}

function initSettings() {
  document.getElementById('set-currency').value = settings.currency;
  document.getElementById('set-api').value = API_BASE;
  document.getElementById('set-api-status').textContent = `Aktiv: ${API_BASE}`;
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
  document.getElementById('set-color').value = rgbToHex(accent) || '#7c6af5';
}

function changeCurrency(cur) {
  settings.currency = cur;
  saveSettings();
  renderHome();
  renderPortfolio();
  if (detailAsset) renderDetail(detailAsset.id, detailAsset.type);
}

function changeAccent(hex) {
  document.documentElement.style.setProperty('--primary', hex);
  document.documentElement.style.setProperty('--primary-soft', hexToRgba(hex, 0.15));
  document.documentElement.style.setProperty('--primary-hover', lighten(hex));
}

function rgbToHex(color) {
  if (!color) return '#7c6af5';
  if (color.startsWith('#')) return color;
  const m = color.match(/\d+/g);
  if (!m) return '#7c6af5';
  return '#' + m.slice(0, 3).map(x => parseInt(x, 10).toString(16).padStart(2, '0')).join('');
}

function lighten(hex) {
  const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + 40);
  const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + 40);
  const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + 40);
  return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
}

function confirmClearAll() {
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">Alle Daten löschen?</div>
    <p style="text-align:center;font-size:13px;color:var(--text2);margin-bottom:20px;">Positionen, manuelle Preise und Cache werden gelöscht.</p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-danger" style="flex:1;" onclick="doClearAll()">Alles löschen</button>
    </div>
  `);
}

function doClearAll() {
  transactions = [];
  manualPrices = {};
  priceCache = {};
  histCache = {};
  saveTxns();
  saveManual();
  savePCache();
  saveHCache();
  closeModal();
  showToast('Alle Daten gelöscht', 'ok');
  showScreen('home');
}

function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = type === 'ok' ? 'var(--positive)' : type === 'warn' ? 'var(--gold)' : 'var(--text)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

window.addEventListener('DOMContentLoaded', () => {
  load();
  renderHome();
  renderMarkets();
});

if (API_BASE && transactions.length > 0) {
  setTimeout(refreshPrices, 500);
}
</script>
